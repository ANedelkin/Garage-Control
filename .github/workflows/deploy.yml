name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy Hook
        # Uses curl to send a POST request to your Render Deploy Hook URL.
        # You must configure the RENDER_DEPLOY_HOOK_URL secret in your GitHub repository settings.
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set in GitHub."
            exit 1
          fi
          
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deployment triggered successfully!"
